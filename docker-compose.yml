services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.backend
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3001
      AI_LOCAL_BASE_URL: http://ollama:11434
    volumes:
      - ./deploy/runtime/${APP_ENV}/uploads:/app/uploads
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT}:3001"
    depends_on:
      - ollama
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT}:3000"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.n8n
    environment:
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      NODE_PATH: /opt/n8n-external/node_modules
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      NODE_FUNCTION_ALLOW_EXTERNAL: axios,lodash,dayjs,moment,uuid,zod,cheerio
      TZ: ${GENERIC_TIMEZONE}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
    ports:
      - "127.0.0.1:${N8N_BIND_PORT}:5678"
    volumes:
      - ./deploy/runtime/${APP_ENV}/n8n:/home/node/.n8n
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:5678/ >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./deploy/runtime/${APP_ENV}/ollama:/root/.ollama
