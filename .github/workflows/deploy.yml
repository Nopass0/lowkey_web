name: Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ENV: ${{ github.ref_name == 'main' && 'main' || 'dev' }}
      DOMAIN: ${{ github.ref_name == 'main' && 'lowkey.su' || 'dev.lowkey.su' }}
      AI_DOMAIN: ${{ github.ref_name == 'main' && 'ai.lowkey.su' || '' }}
      N8N_DOMAIN: ${{ github.ref_name == 'main' && 'n8n.lowkey.su' || 'n8n.dev.lowkey.su' }}
      BACKEND_BIND_PORT: ${{ github.ref_name == 'main' && '3101' || '3201' }}
      FRONTEND_BIND_PORT: ${{ github.ref_name == 'main' && '3100' || '3200' }}
      N8N_BIND_PORT: ${{ github.ref_name == 'main' && '5678' || '6678' }}
      BITNET_BIND_PORT: ${{ github.ref_name == 'main' && '8080' || '9080' }}
      NEXT_PUBLIC_API_URL: ${{ github.ref_name == 'main' && 'https://lowkey.su/api' || 'https://dev.lowkey.su/api' }}
      NEXT_PUBLIC_SITE_URL: ${{ github.ref_name == 'main' && 'https://lowkey.su' || 'https://dev.lowkey.su' }}
      VOIDDB_URL: https://db.lowkey.su
      VOIDDB_USERNAME: admin
      VOIDDB_PASSWORD: ${{ secrets.VOIDDB_PASSWORD }}
      VOIDDB_TOKEN: ${{ secrets.VOIDDB_TOKEN }}
      LEGACY_DATABASE_URL: ${{ github.ref_name == 'main' && secrets.DATABASE_URL || secrets.DEV_DATABASE_URL }}
      LEGACY_REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      BACKEND_SECRET: ${{ secrets.BACKEND_SECRET }}
      JWT_EXPIRY: ${{ secrets.JWT_EXPIRY }}
      ADMIN_LOGIN: ${{ secrets.ADMIN_LOGIN }}
      ADMIN_JWT_EXPIRY: ${{ secrets.ADMIN_JWT_EXPIRY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
      TOCHKA_API_KEY: ${{ secrets.TOCHKA_API_KEY }}
      TOCHKA_ACCOUNT_ID: ${{ secrets.TOCHKA_ACCOUNT_ID }}
      TOCHKA_MERCHANT_ID: ${{ secrets.TOCHKA_MERCHANT_ID }}
      LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_DEFAULT_MODEL: openai/gpt-4o-mini
      AI_LOCAL_BASE_URL: http://ollama:11434
      AI_LOCAL_MODEL: qwen3.5:0.8b
      BITNET_MODEL_REPO: 1bitLLM/bitnet_b1_58-large
      BITNET_MODEL_DIR_NAME: bitnet_b1_58-large
      BITNET_QUANT_TYPE: i2_s
      BITNET_USE_PRETUNED: '1'
      BITNET_THREADS: '4'
      BITNET_CTX_SIZE: '4096'
      BITNET_TEMPERATURE: '0.7'
      BITNET_N_PREDICT: '1024'
      GENERIC_TIMEZONE: Asia/Yekaterinburg
      YOKASSA_SHOP_ID: ${{ secrets.YOKASSA_SHOP_ID }}
      YOKASSA_SECRET: ${{ secrets.YOKASSA_SECRET }}
      YOKASSA_TEST_SHOP_ID: ${{ secrets.YOKASSA_TEST_SHOP_ID }}
      YOKASSA_TEST_SECRET: ${{ secrets.YOKASSA_TEST_SECRET }}
      SITE_URL: ${{ github.ref_name == 'main' && 'https://lowkey.su' || 'https://dev.lowkey.su' }}
      N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
      N8N_BASIC_AUTH_ACTIVE: ${{ secrets.N8N_BASIC_AUTH_ACTIVE }}
      N8N_BASIC_AUTH_USER: ${{ secrets.N8N_BASIC_AUTH_USER }}
      N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
      REMOTE_BASE: /opt/lowkey_site/${{ github.ref_name == 'main' && 'main' || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare env files
        shell: bash
        run: |
          cat > .env.compose <<EOF
          APP_ENV=${APP_ENV}
          BACKEND_BIND_PORT=${BACKEND_BIND_PORT}
          FRONTEND_BIND_PORT=${FRONTEND_BIND_PORT}
          N8N_BIND_PORT=${N8N_BIND_PORT}
          BITNET_BIND_PORT=${BITNET_BIND_PORT}
          GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
          LETSENCRYPT_ROOT_DIR=/etc/letsencrypt
          BITNET_MODEL_REPO=${BITNET_MODEL_REPO}
          BITNET_MODEL_DIR_NAME=${BITNET_MODEL_DIR_NAME}
          BITNET_QUANT_TYPE=${BITNET_QUANT_TYPE}
          BITNET_USE_PRETUNED=${BITNET_USE_PRETUNED}
          BITNET_THREADS=${BITNET_THREADS}
          BITNET_CTX_SIZE=${BITNET_CTX_SIZE}
          BITNET_TEMPERATURE=${BITNET_TEMPERATURE}
          BITNET_N_PREDICT=${BITNET_N_PREDICT}
          EOF

          cat > .env.backend <<EOF
          VOIDDB_URL=${VOIDDB_URL}
          VOIDDB_USERNAME=${VOIDDB_USERNAME}
          VOIDDB_PASSWORD=${VOIDDB_PASSWORD}
          VOIDDB_TOKEN=${VOIDDB_TOKEN}
          BACKEND_SECRET=${BACKEND_SECRET}
          LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
          LEGACY_DATABASE_URL=${LEGACY_DATABASE_URL}
          LEGACY_REDIS_URL=${LEGACY_REDIS_URL}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRY=${JWT_EXPIRY}
          ADMIN_LOGIN=${ADMIN_LOGIN}
          ADMIN_JWT_EXPIRY=${ADMIN_JWT_EXPIRY}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID}
          TOCHKA_API_KEY=${TOCHKA_API_KEY}
          TOCHKA_ACCOUNT_ID=${TOCHKA_ACCOUNT_ID}
          TOCHKA_MERCHANT_ID=${TOCHKA_MERCHANT_ID}
          BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          AI_LOCAL_BASE_URL=${AI_LOCAL_BASE_URL}
          AI_LOCAL_MODEL=${AI_LOCAL_MODEL}
          APP_FILES_DIR=./uploads
          PORT=3001
          NODE_ENV=production
          EOF

          cat > .env.n8n <<EOF
          N8N_HOST=${N8N_DOMAIN}
          N8N_PORT=5678
          N8N_PROTOCOL=https
          N8N_EDITOR_BASE_URL=https://${N8N_DOMAIN}
          WEBHOOK_URL=https://${N8N_DOMAIN}/
          N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-${JWT_SECRET}}
          NODE_ENV=production
          N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
          N8N_RUNNERS_ENABLED=true
          N8N_DIAGNOSTICS_ENABLED=false
          N8N_PERSONALIZATION_ENABLED=false
          N8N_CUSTOM_EXTENSIONS=/opt/n8n-custom/node_modules
          NODE_FUNCTION_ALLOW_BUILTIN=*
          NODE_FUNCTION_ALLOW_EXTERNAL=axios,lodash,dayjs,moment,uuid,zod,cheerio,openai,@voiddb/orm
          GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
          TZ=${GENERIC_TIMEZONE}
          N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
          N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
          N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
          EOF

      - name: Install rsync dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Upload project with rsync
        shell: bash
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            while true; do
              "$@"
              local exit_code=$?
              if (( exit_code == 0 )); then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                return "${exit_code}"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed with exit code ${exit_code}. Retrying in ${delay}s..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          SSH_OPTS="-p ${SSH_PORT} -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o TCPKeepAlive=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1"
          retry 4 sshpass -p "${SSH_PASSWORD}" rsync -az --delete \
            -e "ssh ${SSH_OPTS}" \
            --rsync-path="mkdir -p '${REMOTE_BASE}' && rsync" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "frontend/node_modules/" \
            --exclude "frontend/.next/" \
            --exclude "frontend/ssl/" \
            --exclude "frontend/.env*" \
            --exclude "frontend/*.tsbuildinfo" \
            --exclude "backend/node_modules/" \
            --exclude "backend/dist/" \
            --exclude "backend/.env*" \
            --exclude "deploy/runtime/" \
            ./ "${SSH_USER}@${SSH_SERVER}:${REMOTE_BASE}/"

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          APP_ENV: ${{ env.APP_ENV }}
          DOMAIN: ${{ env.DOMAIN }}
          AI_DOMAIN: ${{ env.AI_DOMAIN }}
          N8N_DOMAIN: ${{ env.N8N_DOMAIN }}
          BACKEND_BIND_PORT: ${{ env.BACKEND_BIND_PORT }}
          FRONTEND_BIND_PORT: ${{ env.FRONTEND_BIND_PORT }}
          N8N_BIND_PORT: ${{ env.N8N_BIND_PORT }}
          BITNET_BIND_PORT: ${{ env.BITNET_BIND_PORT }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
          REMOTE_BASE: ${{ env.REMOTE_BASE }}
          LETSENCRYPT_EMAIL: ${{ env.LETSENCRYPT_EMAIL }}
          VOIDDB_URL: ${{ env.VOIDDB_URL }}
          VOIDDB_USERNAME: ${{ env.VOIDDB_USERNAME }}
          VOIDDB_PASSWORD: ${{ env.VOIDDB_PASSWORD }}
          VOIDDB_TOKEN: ${{ env.VOIDDB_TOKEN }}
          BACKEND_SECRET: ${{ env.BACKEND_SECRET }}
          LEGACY_DATABASE_URL: ${{ env.LEGACY_DATABASE_URL }}
          LEGACY_REDIS_URL: ${{ env.LEGACY_REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_EXPIRY: ${{ env.JWT_EXPIRY }}
          ADMIN_LOGIN: ${{ env.ADMIN_LOGIN }}
          ADMIN_JWT_EXPIRY: ${{ env.ADMIN_JWT_EXPIRY }}
          TELEGRAM_BOT_TOKEN: ${{ env.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ env.TELEGRAM_ADMIN_CHAT_ID }}
          TOCHKA_API_KEY: ${{ env.TOCHKA_API_KEY }}
          TOCHKA_ACCOUNT_ID: ${{ env.TOCHKA_ACCOUNT_ID }}
          TOCHKA_MERCHANT_ID: ${{ env.TOCHKA_MERCHANT_ID }}
          BLOB_READ_WRITE_TOKEN: ${{ env.BLOB_READ_WRITE_TOKEN }}
          OPENROUTER_API_KEY: ${{ env.OPENROUTER_API_KEY }}
          OPENROUTER_DEFAULT_MODEL: ${{ env.OPENROUTER_DEFAULT_MODEL }}
          AI_LOCAL_BASE_URL: ${{ env.AI_LOCAL_BASE_URL }}
          AI_LOCAL_MODEL: ${{ env.AI_LOCAL_MODEL }}
          BITNET_MODEL_REPO: ${{ env.BITNET_MODEL_REPO }}
          BITNET_MODEL_DIR_NAME: ${{ env.BITNET_MODEL_DIR_NAME }}
          BITNET_QUANT_TYPE: ${{ env.BITNET_QUANT_TYPE }}
          BITNET_USE_PRETUNED: ${{ env.BITNET_USE_PRETUNED }}
          BITNET_THREADS: ${{ env.BITNET_THREADS }}
          BITNET_CTX_SIZE: ${{ env.BITNET_CTX_SIZE }}
          BITNET_TEMPERATURE: ${{ env.BITNET_TEMPERATURE }}
          BITNET_N_PREDICT: ${{ env.BITNET_N_PREDICT }}
          GENERIC_TIMEZONE: ${{ env.GENERIC_TIMEZONE }}
          N8N_ENCRYPTION_KEY: ${{ env.N8N_ENCRYPTION_KEY }}
          N8N_BASIC_AUTH_ACTIVE: ${{ env.N8N_BASIC_AUTH_ACTIVE }}
          N8N_BASIC_AUTH_USER: ${{ env.N8N_BASIC_AUTH_USER }}
          N8N_BASIC_AUTH_PASSWORD: ${{ env.N8N_BASIC_AUTH_PASSWORD }}
          YOKASSA_SHOP_ID: ${{ env.YOKASSA_SHOP_ID }}
          YOKASSA_SECRET: ${{ env.YOKASSA_SECRET }}
          YOKASSA_TEST_SHOP_ID: ${{ env.YOKASSA_TEST_SHOP_ID }}
          YOKASSA_TEST_SECRET: ${{ env.YOKASSA_TEST_SECRET }}
          SITE_URL: ${{ env.SITE_URL }}
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            while true; do
              "$@"
              local exit_code=$?
              if (( exit_code == 0 )); then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                return "${exit_code}"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed with exit code ${exit_code}. Retrying in ${delay}s..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          SSH_OPTS="-p ${SSH_PORT} -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=40 -o TCPKeepAlive=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1"
          retry 4 sshpass -p "${SSH_PASSWORD}" ssh \
            ${SSH_OPTS} \
            "${SSH_USER}@${SSH_SERVER}" \
            "cd '${REMOTE_BASE}' && \
             chmod +x deploy/scripts/provision-server.sh && \
             chmod +x deploy/scripts/deploy.sh && \
             APP_ENV='${APP_ENV}' \
             DOMAIN='${DOMAIN}' \
             AI_DOMAIN='${AI_DOMAIN}' \
             N8N_DOMAIN='${N8N_DOMAIN}' \
             BACKEND_BIND_PORT='${BACKEND_BIND_PORT}' \
             FRONTEND_BIND_PORT='${FRONTEND_BIND_PORT}' \
             N8N_BIND_PORT='${N8N_BIND_PORT}' \
             BITNET_BIND_PORT='${BITNET_BIND_PORT}' \
             NEXT_PUBLIC_API_URL='${NEXT_PUBLIC_API_URL}' \
             NEXT_PUBLIC_SITE_URL='${NEXT_PUBLIC_SITE_URL}' \
             LETSENCRYPT_EMAIL='${LETSENCRYPT_EMAIL}' \
             VOIDDB_URL='${VOIDDB_URL}' \
             VOIDDB_USERNAME='${VOIDDB_USERNAME}' \
             VOIDDB_PASSWORD='${VOIDDB_PASSWORD}' \
             VOIDDB_TOKEN='${VOIDDB_TOKEN}' \
             BACKEND_SECRET='${BACKEND_SECRET}' \
             LEGACY_DATABASE_URL='${LEGACY_DATABASE_URL}' \
             LEGACY_REDIS_URL='${LEGACY_REDIS_URL}' \
             JWT_SECRET='${JWT_SECRET}' \
             JWT_EXPIRY='${JWT_EXPIRY}' \
             ADMIN_LOGIN='${ADMIN_LOGIN}' \
             ADMIN_JWT_EXPIRY='${ADMIN_JWT_EXPIRY}' \
             TELEGRAM_BOT_TOKEN='${TELEGRAM_BOT_TOKEN}' \
             TELEGRAM_ADMIN_CHAT_ID='${TELEGRAM_ADMIN_CHAT_ID}' \
             TOCHKA_API_KEY='${TOCHKA_API_KEY}' \
             TOCHKA_ACCOUNT_ID='${TOCHKA_ACCOUNT_ID}' \
             TOCHKA_MERCHANT_ID='${TOCHKA_MERCHANT_ID}' \
             BLOB_READ_WRITE_TOKEN='${BLOB_READ_WRITE_TOKEN}' \
             OPENROUTER_API_KEY='${OPENROUTER_API_KEY}' \
             OPENROUTER_DEFAULT_MODEL='${OPENROUTER_DEFAULT_MODEL}' \
             AI_LOCAL_BASE_URL='${AI_LOCAL_BASE_URL}' \
             AI_LOCAL_MODEL='${AI_LOCAL_MODEL}' \
             BITNET_MODEL_REPO='${BITNET_MODEL_REPO}' \
             BITNET_MODEL_DIR_NAME='${BITNET_MODEL_DIR_NAME}' \
             BITNET_QUANT_TYPE='${BITNET_QUANT_TYPE}' \
             BITNET_USE_PRETUNED='${BITNET_USE_PRETUNED}' \
             BITNET_THREADS='${BITNET_THREADS}' \
             BITNET_CTX_SIZE='${BITNET_CTX_SIZE}' \
             BITNET_TEMPERATURE='${BITNET_TEMPERATURE}' \
             BITNET_N_PREDICT='${BITNET_N_PREDICT}' \
             GENERIC_TIMEZONE='${GENERIC_TIMEZONE}' \
             N8N_ENCRYPTION_KEY='${N8N_ENCRYPTION_KEY}' \
             N8N_BASIC_AUTH_ACTIVE='${N8N_BASIC_AUTH_ACTIVE}' \
             N8N_BASIC_AUTH_USER='${N8N_BASIC_AUTH_USER}' \
             N8N_BASIC_AUTH_PASSWORD='${N8N_BASIC_AUTH_PASSWORD}' \
             YOKASSA_SHOP_ID='${YOKASSA_SHOP_ID}' \
             YOKASSA_SECRET='${YOKASSA_SECRET}' \
             YOKASSA_TEST_SHOP_ID='${YOKASSA_TEST_SHOP_ID}' \
             YOKASSA_TEST_SECRET='${YOKASSA_TEST_SECRET}' \
             SITE_URL='${SITE_URL}' \
             ./deploy/scripts/deploy.sh"

      - name: Deploy English over SSH
        if: github.ref_name == 'main'
        shell: bash
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          REMOTE_BASE: ${{ env.REMOTE_BASE }}
          APP_ENV: main
          DOMAIN: english.lowkey.su
          LETSENCRYPT_EMAIL: ${{ env.LETSENCRYPT_EMAIL }}
          BACKEND_BIND_PORT: '3302'
          FRONTEND_BIND_PORT: '3303'
          NEXT_PUBLIC_SITE_URL: https://english.lowkey.su
          NEXT_PUBLIC_API_URL: /api
          BACKEND_INTERNAL_URL: http://backend:3002
          CORS_ORIGINS: https://english.lowkey.su
          VOIDDB_URL: ${{ env.VOIDDB_URL }}
          VOIDDB_DATABASE: english
          VOIDDB_USERNAME: ${{ env.VOIDDB_USERNAME }}
          VOIDDB_PASSWORD: ${{ env.VOIDDB_PASSWORD }}
          VOIDDB_TOKEN: ${{ env.VOIDDB_TOKEN }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: lowkey_english_bot
          JWT_SECRET: ${{ env.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ env.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_URL: https://english.lowkey.su
          YOKASSA_SHOP_ID: ${{ env.YOKASSA_SHOP_ID }}
          YOKASSA_SECRET: ${{ env.YOKASSA_SECRET }}
          YOKASSA_TEST_SHOP_ID: ${{ env.YOKASSA_TEST_SHOP_ID }}
          YOKASSA_TEST_SECRET: ${{ env.YOKASSA_TEST_SECRET }}
          YOKASSA_TEST_MODE: 'true'
          OPENROUTER_URL: https://openrouter.ai/api/v1
          OPENROUTER_API_KEY: ${{ env.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ env.OPENROUTER_DEFAULT_MODEL }}
          OPENROUTER_SITE_URL: https://english.lowkey.su
          OPENROUTER_SITE_NAME: LowKey English
          OPENROUTER_TEMPERATURE: '0.7'
          OPENROUTER_MAX_TOKENS: '2048'
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            while true; do
              "$@"
              local exit_code=$?
              if (( exit_code == 0 )); then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                return "${exit_code}"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed with exit code ${exit_code}. Retrying in ${delay}s..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          SSH_OPTS="-p ${SSH_PORT} -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=40 -o TCPKeepAlive=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1"
          retry 4 sshpass -p "${SSH_PASSWORD}" ssh \
            ${SSH_OPTS} \
            "${SSH_USER}@${SSH_SERVER}" \
            "cd '${REMOTE_BASE}/english' && \
             chmod +x deploy/scripts/provision-server.sh && \
             chmod +x deploy/scripts/deploy.sh && \
             APP_ENV='${APP_ENV}' \
             DOMAIN='${DOMAIN}' \
             LETSENCRYPT_EMAIL='${LETSENCRYPT_EMAIL}' \
             BACKEND_BIND_PORT='${BACKEND_BIND_PORT}' \
             FRONTEND_BIND_PORT='${FRONTEND_BIND_PORT}' \
             NEXT_PUBLIC_SITE_URL='${NEXT_PUBLIC_SITE_URL}' \
             NEXT_PUBLIC_API_URL='${NEXT_PUBLIC_API_URL}' \
             BACKEND_INTERNAL_URL='${BACKEND_INTERNAL_URL}' \
             CORS_ORIGINS='${CORS_ORIGINS}' \
             VOIDDB_URL='${VOIDDB_URL}' \
             VOIDDB_DATABASE='${VOIDDB_DATABASE}' \
             VOIDDB_USERNAME='${VOIDDB_USERNAME}' \
             VOIDDB_PASSWORD='${VOIDDB_PASSWORD}' \
             VOIDDB_TOKEN='${VOIDDB_TOKEN}' \
             NEXT_PUBLIC_TELEGRAM_BOT_USERNAME='${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}' \
             JWT_SECRET='${JWT_SECRET}' \
             TELEGRAM_BOT_TOKEN='${TELEGRAM_BOT_TOKEN}' \
             TELEGRAM_WEBHOOK_URL='${TELEGRAM_WEBHOOK_URL}' \
             YOKASSA_SHOP_ID='${YOKASSA_SHOP_ID}' \
             YOKASSA_SECRET='${YOKASSA_SECRET}' \
             YOKASSA_TEST_SHOP_ID='${YOKASSA_TEST_SHOP_ID}' \
             YOKASSA_TEST_SECRET='${YOKASSA_TEST_SECRET}' \
             YOKASSA_TEST_MODE='${YOKASSA_TEST_MODE}' \
             OPENROUTER_URL='${OPENROUTER_URL}' \
             OPENROUTER_API_KEY='${OPENROUTER_API_KEY}' \
             OPENROUTER_MODEL='${OPENROUTER_MODEL}' \
             OPENROUTER_SITE_URL='${OPENROUTER_SITE_URL}' \
             OPENROUTER_SITE_NAME='${OPENROUTER_SITE_NAME}' \
             OPENROUTER_TEMPERATURE='${OPENROUTER_TEMPERATURE}' \
             OPENROUTER_MAX_TOKENS='${OPENROUTER_MAX_TOKENS}' \
             ./deploy/scripts/deploy.sh"

      - name: Verify English public health
        if: github.ref_name == 'main'
        shell: bash
        run: |
          for attempt in {1..24}; do
            if curl -fsS https://english.lowkey.su/api/health >/dev/null 2>&1 &&
               curl -fsS https://english.lowkey.su/ >/dev/null 2>&1; then
              exit 0
            fi
            echo "English public health check attempt ${attempt}/24 failed, retrying in 5s..."
            sleep 5
          done

          echo "english.lowkey.su is still unhealthy after deploy" >&2
          exit 1

      - name: Capture English diagnostics
        if: ${{ failure() && github.ref_name == 'main' }}
        shell: bash
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          REMOTE_BASE: ${{ env.REMOTE_BASE }}
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            while true; do
              "$@"
              local exit_code=$?
              if (( exit_code == 0 )); then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                return "${exit_code}"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed with exit code ${exit_code}. Retrying in ${delay}s..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          SSH_OPTS="-p ${SSH_PORT} -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=40 -o TCPKeepAlive=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1"
          retry 2 sshpass -p "${SSH_PASSWORD}" ssh \
            ${SSH_OPTS} \
            "${SSH_USER}@${SSH_SERVER}" \
            "set -x && \
             cd '${REMOTE_BASE}/english' && \
             docker compose --env-file .env.compose ps || true && \
             docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}' | grep 'english-' || true && \
             curl -sv http://127.0.0.1:3302/health || true && \
             curl -sv http://127.0.0.1:3303/ -o /tmp/english_frontend_body.txt || true && \
             tail -n 40 /tmp/english_frontend_body.txt || true && \
             ss -lntp | grep -E ':3302|:3303' || true && \
             nginx -T 2>/dev/null | sed -n '/server_name english.lowkey.su/,/}/p' || true && \
             docker logs --tail=200 english-backend || true && \
             docker logs --tail=200 english-frontend || true"
