services:
  bitllm:
    build:
      context: ./bitnet
      args:
        BITNET_MODEL_REPO: ${BITNET_MODEL_REPO:-1bitLLM/bitnet_b1_58-large}
        BITNET_MODEL_DIR_NAME: ${BITNET_MODEL_DIR_NAME:-bitnet_b1_58-large}
        BITNET_QUANT_TYPE: ${BITNET_QUANT_TYPE:-i2_s}
        BITNET_USE_PRETUNED: ${BITNET_USE_PRETUNED:-1}
    container_name: english-bitllm
    restart: unless-stopped
    environment:
      BITNET_PORT: 8080
      BITNET_MODEL_DIR_NAME: ${BITNET_MODEL_DIR_NAME:-bitnet_b1_58-large}
      BITNET_QUANT_TYPE: ${BITNET_QUANT_TYPE:-i2_s}
      BITNET_THREADS: ${BITNET_THREADS:-4}
      BITNET_CTX_SIZE: ${BITNET_CTX_SIZE:-4096}
      BITNET_TEMPERATURE: ${BITNET_TEMPERATURE:-0.7}
      BITNET_N_PREDICT: ${BITNET_N_PREDICT:-1024}
    ports:
      - "127.0.0.1:${BITLLM_BIND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/models >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: english-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-3002}:3002"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      NODE_ENV: production
      VOIDDB_URL: ${VOIDDB_URL:-https://db.lowkey.su}
      VOIDDB_DATABASE: ${VOIDDB_DATABASE:-english}
      VOIDDB_TOKEN: ${VOIDDB_TOKEN:-}
      VOIDDB_USERNAME: ${VOIDDB_USERNAME:-}
      VOIDDB_PASSWORD: ${VOIDDB_PASSWORD:-}
      BITLLM_URL: http://bitllm:8080
      FRONTEND_URL: ${NEXT_PUBLIC_SITE_URL:-https://english.lowkey.su}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://english.lowkey.su}
    depends_on:
      - bitllm
    volumes:
      - ./deploy/runtime/${APP_ENV:-main}/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_INTERNAL_URL:-http://backend:3002}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://english.lowkey.su}
    container_name: english-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-3003}:3003"
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3003
      BACKEND_URL: ${BACKEND_INTERNAL_URL:-http://backend:3002}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://english.lowkey.su}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-lowkey_english_bot}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
