services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: english-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-3002}:3002"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      NODE_ENV: production
      VOIDDB_URL: ${VOIDDB_URL:-https://db.lowkey.su}
      VOIDDB_DATABASE: ${VOIDDB_DATABASE:-english}
      VOIDDB_TOKEN: ${VOIDDB_TOKEN:-}
      VOIDDB_USERNAME: ${VOIDDB_USERNAME:-}
      VOIDDB_PASSWORD: ${VOIDDB_PASSWORD:-}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://english.lowkey.su}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-LowKey English}
      OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE:-0.7}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-2048}
      FRONTEND_URL: ${NEXT_PUBLIC_SITE_URL:-https://english.lowkey.su}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://english.lowkey.su}
    volumes:
      - ./deploy/runtime/${APP_ENV:-main}/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_INTERNAL_URL:-http://backend:3002}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://english.lowkey.su}
    container_name: english-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-3003}:3003"
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3003
      BACKEND_URL: ${BACKEND_INTERNAL_URL:-http://backend:3002}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://english.lowkey.su}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-lowkey_english_bot}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
